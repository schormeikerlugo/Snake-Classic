<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>🐍Snake🐍</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1f3a">
  <link rel="icon" href="assets/image/icon/icon-192x192.png">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snake Classic">
  <link rel="apple-touch-icon" href="assets/image/icon/apple-touch-icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/image/icon/apple-touch-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="assets/image/icon/apple-touch-icon-167x167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/image/icon/apple-touch-icon-180x180.png">

  <!-- iOS Splash Screens -->
  <!-- iPhone 13 Pro Max, 14 Plus -->
  <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="assets/image/icon/splash-1284x2778.png">
  <!-- iPhone 13, 14, 15 -->
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="assets/image/icon/splash-1170x2532.png">
  <!-- iPhone X, XS, 11 Pro -->
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="assets/image/icon/splash-1125x2436.png">
  <!-- iPhone XR, 11 -->
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="assets/image/icon/splash-828x1792.png">
  <!-- iPhone 8, SE -->
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="assets/image/icon/splash-750x1334.png">

  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/multiplayer.css">
  <link rel="stylesheet" href="./styles/multiplayer-game.css">

</head>

<body>

  <div id="splash-screen" class="animated-grid-bg">
    <img src="assets/image/logo/logo.png" alt="Snake Game Logo" id="splash-logo">
    <button id="enter-btn">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      Iniciar
    </button>
  </div>

  <div id="menu-view" class="hidden animated-grid-bg">
    <img src="assets/image/logo/logo.png" alt="Snake Game Logo" id="menu-logo">
    <div class="menu-buttons">
      <button id="menu-start" data-translate-key="play">Iniciar Juego</button>
      <button id="menu-multiplayer" data-translate-key="multiplayer">🎮 Multijugador</button>
      <button id="menu-how-to-play" data-translate-key="howToPlay">Cómo Jugar</button>
      <button id="menu-settings" data-translate-key="settings">Configuración</button>
      <button id="menu-account" data-translate-key="account">Cuenta</button>
      <button id="menu-credits" data-translate-key="credits">Créditos</button>
    </div>
    <div id="version-display">v.09</div>
  </div>

  <!-- 🎮 Vista del Juego -->
  <div id="game-view" class="hidden">
    <!-- 📊 HUD (Puntuación y Botones de Escritorio) -->
    <div class="hud">
      <button id="back-to-menu-btn" data-translate-key="back">Menú</button>
      <button id="start" data-translate-key="restart">Reiniciar</button>
      <div class="scores-group">
        <div class="stat">
          <label data-translate-key="score">Puntos: 🎖️</label>
          <span id="score" class="value">0</span>
        </div>
        <div class="stat">
          <label data-translate-key="bestScore">Record: 🏆</label>
          <span id="best" class="value">0</span>
        </div>
      </div>
    </div>

    <div class="game-main-content">
      <!-- Columna de Chat (Izquierda) -->
      <div id="chat-column" class="side-column">
        <h2 class="column-title" data-translate-key="liveChat">Chat en Vivo</h2>
        <div id="chat-messages"></div>
        <form id="chat-form">
          <input type="text" id="chat-input" placeholder="Escribe un mensaje..." data-translate-key="chatPlaceholder"
            required autocomplete="off">
          <button type="submit" data-translate-key="send">Enviar</button>
        </form>
      </div>

      <!-- Columna Central del Juego -->
      <div id="game-column">
        <div class="wrap">
          <!-- 🐍 Tablero de Juego -->
          <div class="board">
            <canvas id="game"></canvas>
            <canvas id="fx"></canvas>
            <div id="paused" class="paused" data-translate-key="pausedMessage">Respira un poco y continua...</div>
          </div>
        </div>
      </div>

      <!-- Columna de Ranking (Derecha) -->
      <div id="ranking-column" class="side-column">
        <h2 class="column-title" data-translate-key="globalRanking">Ranking Global 🏆</h2>
        <div id="ranking-container"></div>
      </div>
    </div>

    <!--🕹️ Controles Móviles -->
    <div class="mobile-controls">
      <div class="mobile-controls-top-row">
        <button id="mobile-restart-btn">↻</button>
        <button id="ctrl-up">▲</button>
        <button id="mobile-pause-btn">II</button>
      </div>
      <div class="middle-row">
        <button id="ctrl-left">▲</button>
        <button id="ctrl-right">▲</button>
      </div>
      <div class="down-row">
        <button id="ctrl-down">▲</button>
      </div>
      <div class="bottom-row">
        <button id="mobile-chat-btn">💬</button>
        <button id="mobile-ranking-btn">🏆</button>
      </div>
    </div>
  </div>

  <!-- 📱 Vistas Móviles -->
  <div id="mobile-chat-view" class="mobile-view">
    <div class="mobile-view-header">
      <h2 class="mobile-view-title">Chat en Vivo</h2>
      <button class="mobile-view-back-btn" data-target="chat">Volver</button>
    </div>
    <div class="mobile-view-content" id="mobile-chat-content">
      <!-- El contenido del chat se moverá aquí dinámicamente -->
    </div>
  </div>

  <div id="mobile-ranking-view" class="mobile-view">
    <div class="mobile-view-header">
      <h2 class="mobile-view-title">Ranking Global 🏆</h2>
      <button class="mobile-view-back-btn" data-target="ranking">Volver</button>
    </div>
    <div class="mobile-view-content" id="mobile-ranking-content">
      <!-- El contenido del ranking se moverá aquí dinámicamente -->
    </div>
  </div>

  <!-- Modal Structure -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button id="modal-close" class="modal-close-btn">&times;</button>
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="./js/lib/supabaseClient.js"></script>
  <script type="module" src="./js/features/auth.js"></script>
  <script type="module" src="./js/features/ranking.js"></script>
  <script type="module" src="./js/features/chat.js"></script>
  <script type="module" src="./js/features/multiplayer/multiplayerUI.js"></script>
  <script type="module" src="./js/ui/ui.js"></script>
  <script type="module" src="./js/fx/particles.js"></script>
  <script type="module" src="./js/main.js"></script>
</body>

</html>
